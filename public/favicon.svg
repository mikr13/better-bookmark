<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Local first AI bookmark graph favicon</title>
  <desc id="desc">A glossy beige circular app icon with a raised bookmark and a soft connected graph shaped like the letter B.</desc>
  <defs>
    <radialGradient id="bg" cx="34" cy="24" r="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff4dc"/>
      <stop offset="0.42" stop-color="#ecd4a9"/>
      <stop offset="1" stop-color="#b99763"/>
    </radialGradient>
    <linearGradient id="rim" x1="26" y1="8" x2="100" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffaf0" stop-opacity="0.95"/>
      <stop offset="0.46" stop-color="#d5b77d" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#765b34" stop-opacity="0.62"/>
    </linearGradient>
    <linearGradient id="bookmarkFill" x1="45" y1="27" x2="88" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff8eb"/>
      <stop offset="0.27" stop-color="#f0d8ab"/>
      <stop offset="0.7" stop-color="#c49b5e"/>
      <stop offset="1" stop-color="#8b6230"/>
    </linearGradient>
    <linearGradient id="bookmarkEdge" x1="43" y1="28" x2="88" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.48" stop-color="#f3d9a8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5f3e1d" stop-opacity="0.8"/>
