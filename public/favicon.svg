      <stop offset="0.45" stop-color="#f5ddb2"/>
      <stop offset="1" stop-color="#9b6b31"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#4c351b" flood-opacity="0.38"/>
    </filter>
    <filter id="bookmarkShadow" x="-35%" y="-25%" width="170%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#5b3b1b" flood-opacity="0.34"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundClip">
